    // ==================== CALCULATION LAYER ====================
    function calculateMemoryFootprint(model, quant, contextWindow) {
      const formatOverheadFactor = 1.05;
      const weightsSizeInGB = (model.params * quant.bpw * formatOverheadFactor) / 8;
      
      const kvCacheFactor = model.developer === 'DeepSeek' && model.type === 'moe' 
        ? 0.0000001 
        : 0.00000018;

      const kvCacheSizeInGB = contextWindow * model.params * kvCacheFactor;
      const engineOverheadInGB = 1.2;
      const totalRequired = weightsSizeInGB + kvCacheSizeInGB + engineOverheadInGB;

      return {
        weightsSize: Math.round(weightsSizeInGB * 100) / 100,
        kvCacheSize: Math.round(kvCacheSizeInGB * 100) / 100,
        overhead: engineOverheadInGB,
        totalRequired: Math.round(totalRequired * 100) / 100,
      };
    }

    function evaluateHardwareMatch(model, quant, contextWindow, hardware, customVram) {
      const memoryInfo = calculateMemoryFootprint(model, quant, contextWindow);
      const totalRequired = memoryInfo.totalRequired;
      const actualHardwareVram = customVram ?? hardware.vram;
      
      let isCompatible = 'yes';
      let explanation = '';
      let bottleneck = '';
      const recommendations = [];
      let estimatedSpeed = 0;

      if (hardware.category === 'mac') {
        const maxSystemMemory = customVram ?? (hardware.vram / 0.8);
        if (totalRequired <= actualHardwareVram) {
          isCompatible = 'yes';
          explanation = `Beautiful match! The entire model fits cleanly within Mac's configured Unified Memory allocation window (${actualHardwareVram}GB).`;
          bottleneck = 'Unified Memory Bandwidth';
          estimatedSpeed = (hardware.memoryBandwidth / memoryInfo.weightsSize) * hardware.tpsScaling;
        } else if (totalRequired <= maxSystemMemory) {
          isCompatible = 'partial';
          explanation = `Fits with warning. Runs on Mac Unified Memory, but exceeds standard GPU-allocated threshold. macOS will dynamically page memory, causing minor performance degradation.`;
          bottleneck = 'System Memory Paging / OS Swap';
          const speedRaw = (hardware.memoryBandwidth / memoryInfo.weightsSize) * hardware.tpsScaling;
          estimatedSpeed = speedRaw * 0.65;
        } else {
          isCompatible = 'no';
          explanation = `Insufficient memory! Model footprint (${totalRequired}GB) exceeds maximum total Unified Memory on this Mac (${maxSystemMemory.toFixed(0)}GB).`;
          bottleneck = 'Out of Memory (OOM)';
          estimatedSpeed = 0;
        }
      } else if (hardware.category === 'pc_cpu') {
        if (totalRequired <= actualHardwareVram) {
          isCompatible = 'yes';
          explanation = `Compatible on CPU. Fits cleanly within system RAM (${actualHardwareVram}GB). It will run, but execution is bound to system RAM speeds.`;
          bottleneck = 'System RAM Memory Bandwidth (CPU-bound)';
          estimatedSpeed = (hardware.memoryBandwidth / memoryInfo.weightsSize) * hardware.tpsScaling;
        } else {
          isCompatible = 'no';
          explanation = `Insufficient system RAM! Model requires ${totalRequired}GB but PC only has ${actualHardwareVram}GB RAM.`;
          bottleneck = 'System RAM limit exceeded';
          estimatedSpeed = 0;
        }
      } else {
        if (totalRequired <= actualHardwareVram) {
          isCompatible = 'yes';
          explanation = `Optimal! The model fits entirely inside dedicated High-Speed VRAM (${actualHardwareVram}GB). Fast execution is guaranteed.`;
          bottleneck = 'GPU Core Compute Limit';
          estimatedSpeed = (hardware.memoryBandwidth / memoryInfo.weightsSize) * hardware.tpsScaling;
        } else {
          const assumedSystemRam = 64; 
          if (totalRequired <= (actualHardwareVram + assumedSystemRam)) {
            isCompatible = 'partial';
            const vramForWeights = Math.max(0, actualHardwareVram - memoryInfo.kvCacheSize - memoryInfo.overhead);
            const weightsInVramRatio = Math.min(1, vramForWeights / memoryInfo.weightsSize);
            const weightsInCpuRatio = 1 - weightsInVramRatio;
            
            explanation = `Partial CPU Offload. Model weights size (${memoryInfo.weightsSize}GB) exceeds dedicated VRAM (${actualHardwareVram}GB). Llama.cpp will offload ${(weightsInCpuRatio * 100).toFixed(0)}% of layers to your system RAM (CPU), lowering token outputs significantly.`;
            bottleneck = 'PCIe Bus Overhead / CPU RAM Bandwidth';
            
            const cpuBandwidth = 80; 
            const weightedBandwidth = 1 / ((weightsInVramRatio / hardware.memoryBandwidth) + (weightsInCpuRatio / cpuBandwidth));
            estimatedSpeed = (weightedBandwidth / memoryInfo.weightsSize) * hardware.tpsScaling * 0.45;
          } else {
            isCompatible = 'no';
            explanation = `Insufficient combined memory! Model occupies ${totalRequired}GB, but GPU VRAM (${actualHardwareVram}GB) and normal system RAM cannot sustain execution.`;
            bottleneck = 'Out of Memory';
            estimatedSpeed = 0;
          }
        }
      }

      if (estimatedSpeed > 150) {
        estimatedSpeed = 150 - (memoryInfo.weightsSize * 0.8);
      }
      estimatedSpeed = Math.max(0, Number(estimatedSpeed.toFixed(1)));

      if (isCompatible === 'yes') {
        recommendations.push("Perfect setup! No changes needed. Increase context widths or try thicker quants to boost quality.");
      } else if (isCompatible === 'partial') {
        recommendations.push("To speed up generation, buy a larger-VRAM GPU or choose a tighter quantization format like Q4_K_M.");
      } else {
        recommendations.push("Suggest stepping down parameters size (e.g. Llama 8b or Phi 14B instead of huge 70B models).");
      }

      return { modelName: model.name, modelParams: model.params, quantName: quant.name, bpw: quant.bpw, requiredVRAM: totalRequired, isCompatible, explanation, estimatedSpeed, bottleneck, recommendations };

                    <select 
                      value={calcQuant.key} 
                      onChange={(e) => setCalcQuant(QUANTIZATIONS.find(q => q.key === e.target.value))}
                      className="px-3 py-2 border border-[#E5E2DD] w-full text-sm bg-white cursor-pointer"
                    >
                      {QUANTIZATIONS.map(q => <option key={q.key} value={q.key}>{q.name} ({q.bpw} BPW) - {q.qualityLoss} Loss</option>)}
                    </select>
                  </div>

                  {/* Slider Context Width */}
                  <div className="space-y-2">
                    <div className="flex justify-between text-xs font-mono font-bold">
                      <span>Context Window (Tokens)</span>
                      <span>{calcContext.toLocaleString()} tokens</span>
                    </div>
                    <input 
                      type="range" 
                      min="1024" 
                      max="131072" 
                      step="1024" 
                      value={calcContext} 
                      onChange={(e) => setCalcContext(Number(e.target.value))}
                      className="w-full accent-[#1A1A1A] cursor-pointer"
                    />
                    <div className="flex justify-between text-[10px] text-[#8C8881] font-mono">
                      <span>1,024</span>
                      <span>8K</span>
                      <span>32K</span>
                      <span>128K</span>
                    </div>
                  </div>

                  {/* Target Hardware Grid */}
                  <div className="space-y-1.5">
                    <label className="text-xs font-bold uppercase text-[#5C5852] font-mono">Physically Simulating Hardware</label>
                    <select 
                      value={calcHardware.id} 
                      onChange={(e) => setCalcHardware(HARDWARE_PROFILES.find(h => h.id === e.target.value))}
                      className="px-3 py-2 border border-[#E5E2DD] w-full text-sm bg-white cursor-pointer text-xs"
                    >
                      {HARDWARE_PROFILES.map(h => <option key={h.id} value={h.id}>{h.name} ({h.vram}GB - {h.memoryBandwidth}GB/s)</option>)}
                    </select>
                  </div>
                </div>

                {/* Outputs Sizing & Evaluation */}
                <div className="lg:col-span-8 space-y-6">
                  
                  {/* Sizing result card */}
                  <div className="bg-white p-6 border border-[#E5E2DD] grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="space-y-1">
                      <span className="text-[10px] font-mono uppercase text-[#8C8881] block">Model Weights Size</span>
                      <strong className="text-2xl font-serif font-black">{Math.round((calcModel.params * calcQuant.bpw * 1.05 / 8) * 100)/100} GB</strong>
                      <p className="text-[11px] text-[#5C5852] mt-1 italic">{calcQuant.name} encoding format.</p>
                    </div>

                    <div className="space-y-1">
                      <span className="text-[10px] font-mono uppercase text-[#8C8881] block">KV Cache Size</span>
                      <strong className="text-2xl font-serif font-black">{Math.round((calcContext * calcModel.params * (calcModel.developer === 'DeepSeek' && calcModel.type === 'moe' ? 0.0000001 : 0.00000018)) * 100)/100} GB</strong>
                      <p className="text-[11px] text-[#5C5852] mt-1 italic">Context memory allocation.</p>
                    </div>

                    <div className="space-y-1">
                      <span className="text-[10px] font-mono uppercase text-[#8C8881] block">Total Footprint</span>
                      <span className="bg-[#1A1A1A] text-[#F9F7F2] font-mono text-center text-xs px-2.5 py-0.5 font-bold inline-block mb-1">TOTAL REQUIRED</span>
                      <strong className="text-3xl font-serif font-black text-rose-700 block">{calcResult.requiredVRAM} GB</strong>
                    </div>
                  </div>

                  {/* Compatibility evaluation result */}
                  <div className={`p-6 border ${calcResult.isCompatible === 'yes' ? 'bg-[#ECFDF5] border-emerald-400' : (calcResult.isCompatible === 'partial' ? 'bg-[#FFFBEB] border-amber-400' : 'bg-[#FEF2F2] border-rose-400')} space-y-4`}>
                    <div className="flex items-center gap-3">
                      <span className={`text-[10px] font-mono font-black border uppercase px-3 py-1 ${calcResult.isCompatible === 'yes' ? 'bg-emerald-100 text-emerald-800 border-emerald-300' : (calcResult.isCompatible === 'partial' ? 'bg-amber-100 text-amber-800 border-amber-400' : 'bg-rose-105 text-rose-800 border-rose-300')}`}>
                        {calcResult.isCompatible === 'yes' ? 'Perfect Match' : (calcResult.isCompatible === 'partial' ? 'Paging/Offload' : 'Insufficient memory (OOM)')}
                      </span>
                      <h4 className="text-lg font-bold font-serif italic text-neutral-900">{calcHardware.name} vs. {calcModel.name}</h4>
                    </div>

                    <p className="text-xs text-neutral-800 leading-relaxed font-sans">{calcResult.explanation}</p>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 border-t pt-4 border-neutral-200">
                      <div>
                        <span className="text-[10px] font-mono uppercase text-neutral-500 block">Est. Inference Speed</span>
                        <strong className="text-2xl font-serif font-black text-neutral-900">{calcResult.estimatedSpeed} tokens/sec</strong>
                        <p className="text-[11px] text-neutral-600 mt-1">Calculated via Memory Bandwidth lines.</p>
                      </div>

                      <div>
                        <span className="text-[10px] font-mono uppercase text-neutral-500 block">Primary Bottleneck</span>
                        <strong className="text-[13px] font-mono text-rose-700 flex items-center gap-1.5 font-semibold mt-1">
                          <Icon name="alert" className="h-4 w-4" />
                          {calcResult.bottleneck}
                        </strong>
                      </div>
                    </div>

                    <div className="border-t pt-4 border-neutral-200">
                      <span className="text-[10px] font-mono uppercase text-neutral-500 font-bold block mb-2">Tactical Action Recommendation Checklist:</span>
                      <ul className="text-xs text-neutral-700 space-y-1 list-disc list-inside">
                        {calcResult.recommendations.map((rec, idx) => <li key={idx} className="font-sans leading-relaxed">{rec}</li>)}
                      </ul>
                    </div>
                  </div>

                </div>

              </div>
            )}

            {/* 3. DUAL COMPARISON TAB */}
            {activeTab === 'compare' && (
              <div className="space-y-6">
                
                {/* Configuration header menu */}
                <div className="bg-white p-5 border border-[#E5E2DD] gap-6 grid grid-cols-1 md:grid-cols-3">
                  <div className="space-y-1.5">
                    <label className="text-xs font-bold uppercase text-[#5C5852] font-mono">Evaluate Model Sizing</label>
                    <select value={compModel.id} onChange={(e) => setCompModel(MODELS.find(m => m.id === e.target.value))} className="px-3 py-2 border border-[#E5E2DD] w-full text-xs bg-white cursor-pointer font-bold">
                      {MODELS.map(m => <option key={m.id} value={m.id}>{m.name} ({m.params}B)</option>)}
                    </select>
                  </div>

                  <div className="space-y-1.5">
                    <label className="text-xs font-bold uppercase text-[#5C5852] font-mono">Precision Bits Range</label>
                    <select value={compQuant.key} onChange={(e) => setCompQuant(QUANTIZATIONS.find(q => q.key === e.target.value))} className="px-3 py-2 border border-[#E5E2DD] w-full text-xs bg-white cursor-pointer font-bold">
                      {QUANTIZATIONS.map(q => <option key={q.key} value={q.key}>{q.name} ({q.bpw} BPW)</option>)}
                    </select>
                  </div>

                  <div className="space-y-2">
                    <div className="flex justify-between text-xs font-mono font-bold"><span>Context Scale</span><span>{compContext.toLocaleString()} tokens</span></div>
                    <input type="range" min="1024" max="65536" step="1024" value={compContext} onChange={(e) => setCompContext(Number(e.target.value))} className="w-full accent-[#1A1A1A]" />
                  </div>
                </div>

                {/* Left/Right Split view */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  
                  {/* Comparison profile A */}
                  <div className="bg-white p-6 border border-[#E5E2DD] space-y-6">
                    <div className="border-b pb-4 border-neutral-200">
                      <span className="bg-[#1A1A1A] text-[#F9F7F2] text-[9px] font-mono px-2 py-0.5 tracking-wider uppercase font-bold">HARDWARE SLOT A</span>
                      <div className="mt-3 space-y-1.5">
                        <label className="text-xs font-bold text-neutral-500 uppercase block font-mono">Target Rig Setup</label>
                        <select value={compHardwareA.id} onChange={(e) => setCompHardwareA(HARDWARE_PROFILES.find(h => h.id === e.target.value))} className="px-3 py-2 border border-[#E5E2DD] w-full text-sm bg-white cursor-pointer font-bold">
                          {HARDWARE_PROFILES.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}
                        </select>
                      </div>
                    </div>

                    <div className="space-y-3">
                      <div className="flex justify-between text-xs font-mono"><span>VRAM Allocation:</span><strong className="text-neutral-900">{compHardwareA.vram} GB {compHardwareA.memoryType}</strong></div>
                      <div className="flex justify-between text-xs font-mono"><span>Memory Bus Speed:</span><strong className="text-neutral-900">{compHardwareA.memoryBandwidth} GB/s</strong></div>
                      <div className="flex justify-between text-xs font-mono"><span>Inference Match:</span>
                        <span className={`font-bold uppercase ${compResultA.isCompatible === 'yes' ? 'text-emerald-700' : (compResultA.isCompatible === 'partial' ? 'text-amber-700' : 'text-rose-700')}`}>
                          {compResultA.isCompatible}
                        </span>
                      </div>
                      <div className="flex justify-between text-xs font-mono"><span>Estimated Speed:</span><strong className="text-emerald-700 text-lg font-serif">{compResultA.estimatedSpeed} tps</strong></div>
                    </div>

                    <div className="bg-[#F9F7F2] p-4 text-xs font-sans text-[#5C5852] border border-dashed leading-relaxed">
                      {compResultA.explanation}
                    </div>
                  </div>

                  {/* Comparison profile B */}
                  <div className="bg-white p-6 border border-[#E5E2DD] space-y-6">
                    <div className="border-b pb-4 border-neutral-200">
                      <span className="bg-neutral-200 text-neutral-800 text-[9px] font-mono px-2 py-0.5 tracking-wider uppercase font-bold">HARDWARE SLOT B</span>
                      <div className="mt-3 space-y-1.5">
                        <label className="text-xs font-bold text-neutral-500 uppercase block font-mono">Target Rig Setup</label>
                        <select value={compHardwareB.id} onChange={(e) => setCompHardwareB(HARDWARE_PROFILES.find(h => h.id === e.target.value))} className="px-3 py-2 border border-[#E5E2DD] w-full text-sm bg-white cursor-pointer font-bold">
                          {HARDWARE_PROFILES.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}
                        </select>
                      </div>
                    </div>

                    <div className="space-y-3">
                      <div className="flex justify-between text-xs font-mono"><span>VRAM Allocation:</span><strong className="text-neutral-900">{compHardwareB.vram} GB {compHardwareB.memoryType}</strong></div>
                      <div className="flex justify-between text-xs font-mono"><span>Memory Bus Speed:</span><strong className="text-neutral-900">{compHardwareB.memoryBandwidth} GB/s</strong></div>
                      <div className="flex justify-between text-xs font-mono"><span>Inference Match:</span>
                        <span className={`font-bold uppercase ${compResultB.isCompatible === 'yes' ? 'text-emerald-700' : (compResultB.isCompatible === 'partial' ? 'text-amber-700' : 'text-rose-700')}`}>
                          {compResultB.isCompatible}
                        </span>
                      </div>
                      <div className="flex justify-between text-xs font-mono"><span>Estimated Speed:</span><strong className="text-emerald-700 text-lg font-serif">{compResultB.estimatedSpeed} tps</strong></div>
                    </div>

                    <div className="bg-[#F9F7F2] p-4 text-xs font-sans text-[#5C5852] border border-dashed leading-relaxed">
                      {compResultB.explanation}
                    </div>
                  </div>

                </div>

              </div>
            )}

            {/* 4. SETUP MULTI-MATRIX TAB */}
            {activeTab === 'analyzer' && (
              <div className="space-y-6">
                
                {/* Rig Input Box Controls */}
                <div className="bg-white p-6 border border-[#E5E2DD] space-y-4">
                  <div className="border-b pb-2 flex justify-between items-center">
                    <h3 className="text-lg font-bold font-serif text-[#1A1A1A] flex items-center gap-1.5">
                      <Icon name="sliders" className="h-5 w-5 text-neutral-800" />
                      Parameter-Sizing Rig Simulator
                    </h3>
                    <span className="text-[10px] font-mono text-neutral-400">Interactive testing tool</span>
                  </div>

                  {/* Sliders layout */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-[#F2EFE9]">
                    <div className="space-y-1.5">
                      <label className="text-xs font-bold uppercase text-[#5C5852] font-mono">Compute Platform Type</label>
                      <select value={rigPlatform} onChange={(e) => setRigPlatform(e.target.value)} className="px-3 py-2 border border-[#E5E2DD] w-full text-sm bg-white cursor-pointer font-sans font-semibold">
                        <option value="pc_gpu">NVIDIA/AMD Discrete GPU Laptop/PC</option>
                        <option value="mac">Apple Metal Silicon Series Unified</option>
                        <option value="pc_cpu">Standard CPU Processing (Pure system RAM)</option>
                      </select>
                    </div>

                    <div className="space-y-2">
                      <div className="flex justify-between text-xs font-mono font-bold"><span>Total system RAM pool:</span><span>{rigRam} GB RAM</span></div>
                      <input type="range" min="8" max="512" step="8" value={rigRam} onChange={(e) => setRigRam(Number(e.target.value))} className="w-full accent-[#1A1A1A]" />
                    </div>

                    {rigPlatform === 'pc_gpu' && (
                      <div className="space-y-2">
                        <div className="flex justify-between text-xs font-mono font-bold"><span>Dedicated VRAM pool:</span><span>{rigVram} GB VRAM</span></div>
                        <input type="range" min="4" max="96" step="1" value={rigVram} onChange={(e) => setRigVram(Number(e.target.value))} className="w-full accent-[#1A1A1A]" />
                      </div>
                    )}

                    <div className="space-y-2">
                      <div className="flex justify-between text-xs font-mono font-bold">
                        <span>{rigPlatform === 'pc_cpu' ? 'System Memory Speed (Bandwidth)' : 'Active GPU memory Bandwidth'}</span>
                        <span>{rigPlatform === 'pc_cpu' ? rigCpuRamSpeed : rigBandwidth} GB/s</span>
                      </div>
                      {rigPlatform === 'pc_cpu' ? (
                        <input type="range" min="20" max="200" step="5" value={rigCpuRamSpeed} onChange={(e) => setRigCpuRamSpeed(Number(e.target.value))} className="w-full accent-[#1A1A1A]" />
                      ) : (
                        <input type="range" min="50" max="2500" step="25" value={rigBandwidth} onChange={(e) => setRigBandwidth(Number(e.target.value))} className="w-full accent-[#1A1A1A]" />
                      )}
                    </div>
                  </div>
                </div>

                {/* Performance Evaluation Matrix Table */}
                <div className="bg-white p-6 border border-[#E5E2DD] space-y-4">
                  <h3 className="text-lg font-serif italic text-[#1A1A1A] border-b pb-2">Evaluated Database Cross-Matrix (Standard 8K context)</h3>
                  
                  <div className="overflow-x-auto border border-[#1A1A1A]">
                    <table className="w-full text-left text-xs">
                      <thead>
                        <tr className="bg-[#F9F7F2] border-b border-[#1A1A1A] font-mono font-bold text-[10px] uppercase">
                          <th className="p-3">Model Family</th>
                          <th className="p-3 text-center">Params</th>
                          <th className="p-3 text-center">FP16 (Original)</th>
                          <th className="p-3 text-center">Q8_0 (Near-Lossless)</th>
                          <th className="p-3 text-center">Q5_K_M (Budget Sweetspot)</th>
                          <th className="p-3 text-center">Q4_K_M (Optimal Standard)</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-[#E5E2DD] font-mono text-[11px]">
                        {rigAnalysisReport.map(({ model, quantReports }) => {
                          const fp16 = quantReports.find(q => q.quantKey === 'fp16');
                          const q8 = quantReports.find(q => q.quantKey === 'q8_0');
                          const q5 = quantReports.find(q => q.quantKey === 'q5_k_m');
                          const q4 = quantReports.find(q => q.quantKey === 'q4_k_m');

                          const cellStyle = (report) => {
                            if (report.isCompatible === 'no') return <span className="text-red-600 font-bold">OOM</span>;
                            if (report.isCompatible === 'partial') return (
                              <div className="flex flex-col items-center">
                                <span className="text-amber-700 font-bold">{report.estimatedSpeed} tps</span>
                                <span className="text-[8px] text-amber-500 uppercase tracking-wide">Paging</span>
                              </div>
                            );
                            return (
                              <div className="flex flex-col items-center">
                                <span className="text-emerald-700 font-bold">{report.estimatedSpeed} tps</span>
                                <span className="text-[8px] text-emerald-500 font-semibold uppercase">Fitted</span>
                              </div>
                            );
                          };

                          return (
                            <tr key={model.id} className="hover:bg-[#FDFCFB]/50">
                              <td className="p-3 font-sans font-bold border-r border-[#E5E2DD]">{model.name}</td>
                              <td className="p-3 text-center text-[#5C5852] border-r border-[#E5E2DD]">{model.params}B</td>
                              <td className="p-3 text-center border-r border-[#E5E2DD]">{cellStyle(fp16)}</td>
                              <td className="p-3 text-center border-r border-[#E5E2DD]">{cellStyle(q8)}</td>
                              <td className="p-3 text-center border-r border-[#E5E2DD]">{cellStyle(q5)}</td>
                              <td className="p-3 text-center">{cellStyle(q4)}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>

                  <div className="space-y-1 text-[10px] text-[#8C8881] font-mono leading-relaxed border-t pt-4">
                    <p>• <strong className="text-[#1a1a1a]">OOM (Out of Memory)</strong>: Hit hard physical bounds. The simulation cannot start.</p>
                    <p>• <strong className="text-[#1a1a1a]">Paging / Offload</strong>: Llama.cpp splits execution layers. GPU handles partial loads while RAM synchronizes across PCIe lanes.</p>
                  </div>
                </div>

              </div>
            )}

            {/* 5. BLUEPRINT/GUIDES TAB */}
            {activeTab === 'guides' && (
              <div className="space-y-6">
                
                <div className="bg-white p-8 border border-[#E5E2DD] space-y-8">
                  <div className="border-b border-[#E5E2DD] pb-4">
                    <h3 className="text-2xl font-bold font-serif italic text-[#1A1A1A] flex items-center gap-2.5">
                      <Icon name="terminal" className="h-5 w-5 text-neutral-800" />
                      Local AI Deployment Blueprints
                    </h3>
                    <p className="text-xs text-[#5C5852] mt-1.5 leading-relaxed">Pragmatic, battle-tested terminal recipes to get open-weight LLMs running at full computational speed on consumer hardware.</p>
                  </div>

                  {/* Ollama segment */}
                  <div className="space-y-4">
                    <div className="flex items-center gap-2">
                      <span className="bg-[#1A1A1A] text-white text-[9px] font-mono font-bold px-2.5 py-0.5 tracking-wider uppercase">METHOD 1</span>
                      <h4 className="font-bold text-[#1A1A1A] text-sm">Ollama (Easiest Local CLI Interface)</h4>
                    </div>
                    <p className="text-xs text-[#5C5852] leading-relaxed">
                      Ollama auto-compiles the direct parameters needed for optimal model layout on your machine. It targets metal pathways on Apple system pools and configures CUDA layers dynamically on Nvidia.
                    </p>

                    <div className="bg-[#1A1A1A] text-[#F9F7F2] p-5 font-mono text-xs space-y-3">
                      <div className="text-[#8C8881]"># Install using standard CLI commands</div>
                      <div className="border-l-2 border-[#8C8881] pl-3 text-neutral-200">curl -fsSL https://ollama.com/install.sh | sh</div>
                      <div className="text-[#8C8881] mt-3"># Run 8B parameters layout standard format</div>
                      <div className="border-l-2 border-[#8C8881] pl-3 text-neutral-200">ollama run llama3.1:8b</div>
                      <div className="text-[#8C8881] mt-3"># Pull a specialized reasoning class model Distill layout</div>
                      <div className="border-l-2 border-[#8C8881] pl-3 text-neutral-200">ollama run deepseek-r1:8b</div>
                    </div>
                  </div>

                  {/* LM Studio segment */}
                  <div className="space-y-4 border-t border-[#E5E2DD] pt-6">
                    <div className="flex items-center gap-2">
                      <span className="bg-neutral-200 text-neutral-800 text-[9px] font-mono font-bold px-2.5 py-0.5 tracking-wider uppercase">METHOD 2</span>
                      <h4 className="font-bold text-[#1A1A1A] text-sm">LM Studio (Visual Desktop App Playground)</h4>
                    </div>
                    <p className="text-xs text-[#5C5852] leading-relaxed">
                      Download and run absolute raw Hugging Face GGUF repository nodes through a beautiful client wrapper setting.
                    </p>
                    <ol className="list-decimal list-inside text-xs text-[#5C5852] space-y-2 pl-2">
                      <li>Retrieve and setup <strong>LM Studio</strong> from <a href="https://lmstudio.ai" target="_blank" className="font-semibold text-neutral-800 underline">lmstudio.ai</a>.</li>
                      <li>Search for target weights, e.g., <code className="bg-[#F9F7F2] px-1 font-mono text-[11px] border border-[#E5E2DD]">meta-llama/Llama-3.3-70B-Instruct</code>.</li>
                      <li>Allocate the matched quantization format (e.g. <code className="bg-[#F9F7F2] px-1 font-mono text-[11px] border border-[#E5E2DD]">Q4_K_M</code>).</li>
                      <li>Toggle <strong>GPU Offload Setting</strong> to maximum layers to shift files into discrete hardware.</li>
                    </ol>
                  </div>

                  {/* advanced panel */}
                  <div className="bg-[#F9F7F2] p-5 border border-dashed border-[#1A1A1A] space-y-2">
                    <h5 className="text-[10px] font-bold font-mono text-[#1A1A1A] uppercase tracking-wider">Enterprise & Cluster Options:</h5>
                    <ul className="text-xs text-[#5C5852] space-y-1.5 list-disc list-inside">
                      <li><strong>vLLM Node</strong>: Absolute throughput layout for continuous serving.</li>
                      <li><strong>Exo Cluster Layout</strong>: Network chaining layout to pool memory. Link a Mac and PC concurrently to serve large models!</li>
                    </ul>
                  </div>

                </div>

              </div>
            )}

          </main>

          {/* FOOTER BAR */}
          <footer className="bg-[#F9F7F2] border-t border-[#1A1A1A] py-8 mt-auto shrink-0">
            <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-4">
              <p className="text-[10px] text-[#8C8881] font-mono uppercase tracking-wider">
                Local AI Hardware Correlation Matrix • June 2026 Edition
              </p>
              <span className="text-[10px] text-[#8C8881] font-mono uppercase">
                Offline Standalone Edition
              </span>
            </div>
          </footer>

        </div>
      );
    }

    // Mount to absolute root element
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
